<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <radialGradient id="orb" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#6ad7ff"/>
      <stop offset="58%" stop-color="#c08bff"/>
      <stop offset="100%" stop-color="#ff7ad9"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ad7ff"/>
      <stop offset="50%" stop-color="#c08bff"/>
      <stop offset="100%" stop-color="#ff7ad9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g filter="url(#glow)" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.85">
    <ellipse cx="256" cy="256" rx="170" ry="64" transform="rotate(-22 256 256)"/>
    <ellipse cx="256" cy="256" rx="170" ry="64" transform="rotate(38 256 256)"/>
    <ellipse cx="256" cy="256" rx="170" ry="64" transform="rotate(92 256 256)"/>
  </g>
  <circle cx="256" cy="256" r="92" fill="url(#orb)" filter="url(#glow)"/>
</svg>
