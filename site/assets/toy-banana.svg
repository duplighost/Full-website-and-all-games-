      <stop offset=".35" stop-color="#ffca35" stop-opacity=".32"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
