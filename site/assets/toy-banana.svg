<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">The Screaming Banana Dilemma</title>
  <desc id="desc">A strange yellow banana glowing at the end of a polished hallway.</desc>
  <defs>
    <linearGradient id="hall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17131f"/>
      <stop offset=".5" stop-color="#3b2631"/>
      <stop offset="1" stop-color="#08070d"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#72534c"/>
      <stop offset=".45" stop-color="#4a3438"/>
      <stop offset="1" stop-color="#1a151d"/>
    </linearGradient>
    <radialGradient id="bananaGlow" cx="55%" cy="48%" r="38%">
